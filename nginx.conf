worker_processes auto;
events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;
    keepalive_timeout 65;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml;

    gzip_buffers 16 8k;

    upstream ingest {
        server tcm-ingest:8080;
    }
    upstream predictor {
        server tcm-predictor:8082;
    }
    upstream topology {
        server tcm-topology:8083;
    }
    upstream alerter {
        server tcm-alerter:8084;
    }
    upstream analyzer {
        server tcm-analyzer:8085;
    }

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
            expires 1h;
            add_header Cache-Control "public, immutable";
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        location /api/sensor/ {
            proxy_pass http://ingest;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/session/ {
            proxy_pass http://ingest;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/efficacy/ {
            proxy_pass http://ingest;
            proxy_set_header Host $host;
        }

        location /api/predict {
            proxy_pass http://predictor;
            proxy_set_header Host $host;
        }

        location /api/features {
            proxy_pass http://predictor;
            proxy_set_header Host $host;
        }

        location /api/acupoints {
            proxy_pass http://topology;
            proxy_set_header Host $host;
        }

        location /api/meridians {
            proxy_pass http://topology;
            proxy_set_header Host $host;
        }

        location /api/network/ {
            proxy_pass http://topology;
            proxy_set_header Host $host;
        }

        location /api/alerts {
            proxy_pass http://alerter;
            proxy_set_header Host $host;
        }

        location /api/analyzer/ {
            proxy_pass http://analyzer;
            proxy_set_header Host $host;
        }

        location /api/association/ {
            proxy_pass http://analyzer;
            proxy_set_header Host $host;
        }

        location /api/technique/ {
            proxy_pass http://analyzer;
            proxy_set_header Host $host;
        }

        location /api/energy/ {
            proxy_pass http://analyzer;
            proxy_set_header Host $host;
        }

        location /api/qlearn/ {
            proxy_pass http://analyzer;
            proxy_set_header Host $host;
        }

        location /api/health {
            proxy_pass http://ingest;
            proxy_set_header Host $host;
        }

        location /ws {
            proxy_pass http://ingest;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }
}
