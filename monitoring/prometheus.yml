global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'tcm-acupuncture'
    env: 'production'

scrape_configs:
  - job_name: 'tcm-ingest'
    static_configs:
      - targets: ['tcm-ingest:8080']
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: 'tcm-predictor'
    static_configs:
      - targets: ['tcm-predictor:8082']
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: 'tcm-topology'
    static_configs:
      - targets: ['tcm-topology:8083']
    metrics_path: /metrics
    scrape_interval: 30s

  - job_name: 'tcm-alerter'
    static_configs:
      - targets: ['tcm-alerter:8084']
    metrics_path: /metrics
    scrape_interval: 10s
