services:
  ingest:
    host: "0.0.0.0"
    http_port: 8080
    ble_udp_port: 8081
  predictor:
    host: "0.0.0.0"
    http_port: 8082
  topology:
    host: "0.0.0.0"
    http_port: 8083
  alerter:
    host: "0.0.0.0"
    http_port: 8084
  analyzer:
    host: "0.0.0.0"
    http_port: 8085

mongodb:
  uri: "mongodb://tcm:tcm_dev_2024@mongodb:27017"
  db_name: "tcm_acupuncture"
  batch_size: 1000
  flush_interval_ms: 50
  max_queue_size: 100000
  ttl_seconds: 31536000

ble:
  reconnect_initial_delay_ms: 1000
  reconnect_max_delay_ms: 32000
  reconnect_backoff: 2.0
  heartbeat_interval_ms: 5000
  heartbeat_timeout_ms: 12000
  offline_cache_max: 10000

predictor:
  model_path: "/app/models/rf_model.bin"
  num_trees: 50
  max_depth: 15
  min_samples_split: 5
  use_volunteer_normalization: true
  use_group_kfold: true

alerter:
  conductance_drop_threshold: 30.0
  temperature_high: 38.0
  temperature_low: 35.0
  window_size: 50
  dingtalk_webhook_url: ""
  dingtalk_secret: ""
  dingtalk_enabled: false

simulator:
  server_host: "tcm-ingest"
  udp_port: 8081
  http_url: "http://tcm-ingest:8080"
  num_volunteers: 30
  interval_ms: 100
  inject_anomalies: true
  anomaly_probability: 0.005

analyzer:
  apriori_min_support: 0.03
  apriori_min_confidence: 0.25
  apriori_max_len: 4
  energy_baseline_window_sec: 300
  qlearning_learning_rate: 0.1
  qlearning_discount_factor: 0.95
  qlearning_exploration_rate: 0.2
  qlearning_exploration_decay: 0.995

logging:
  level: "info"
  log_dir: "/app/logs"
  max_file_size_mb: 100
  rotation_count: 5

metrics:
  enabled: true
  scrape_interval_s: 15
